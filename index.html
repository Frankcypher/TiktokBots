
<!DOCTYPE html>
<html>
<head>
  <title>TikTok Enterprise Demo</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
      overflow: hidden;
      color: white;
    }

    /* PHONE FRAME */
    .phone {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: black;
    }

    /* TOP BAR */
    .topbar {
      position: absolute;
      top: 0;
      width: 100%;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.3);
    }

    /* PAGES */
    .page {
      display: none;
      height: 100vh;
      width: 100vw;
      position: absolute;
      top: 0;
      left: 0;
    }

    .active {
      display: block;
    }

    /* FEED */
    #feed {
      transition: transform 0.5s ease;
    }

    .video {
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 120px;
      left: 20px;
    }

    .tag {
      background: #00c2ff;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 5px;
      display: inline-block;
    }

    /* NAV BAR */
    .nav {
      position: absolute;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      font-size: 12px;
    }

    .nav div {
      cursor: pointer;
    }

    /* EXPLORE */
    .explore {
      padding: 20px;
    }

    .card {
      background: #111;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 12px;
    }

    /* ANALYTICS */
    .analytics {
      padding: 20px;
    }

    .bar {
      height: 10px;
      background: #222;
      border-radius: 5px;
      margin: 5px 0;
    }

    .fill {
      height: 10px;
      background: #ff0050;
      border-radius: 5px;
    }

  </style>
</head>

<body>

<div class="phone">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>📶 5G</div>
    <div>🔋 88%</div>
  </div>

  <!-- FEED -->
  <div id="feed" class="page active">

    <div class="video">
      <video autoplay muted loop>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4">
      </video>

      <div class="overlay">
        <h3>@creator1</h3>
        <div class="tag">🔥 For You</div>
      </div>
    </div>

    <div class="video">
      <video muted loop>
        <source src="https://www.w3schools.com/html/movie.mp4">
      </video>

      <div class="overlay">
        <h3>@creator2</h3>
        <div class="tag">🔥 Trending</div>
      </div>
    </div>

  </div>

  <!-- EXPLORE -->
  <div id="explore" class="page">

    <div class="explore">

      <h2>🔍 Explore</h2>

      <div class="card">🔥 Viral Videos</div>
      <div class="card">🎵 Trending Sounds</div>
      <div class="card">📈 Rising Creators</div>

    </div>

  </div>

  <!-- ANALYTICS -->
  <div id="analytics" class="page">

    <div class="analytics">

      <h2>📊 Creator Insights</h2>

      <p>Engagement</p>
      <div class="bar"><div class="fill" style="width:80%"></div></div>

      <p>Retention</p>
      <div class="bar"><div class="fill" style="width:65%"></div></div>

      <p>Viral Score</p>
      <div class="bar"><div class="fill" style="width:90%"></div></div>

    </div>

  </div>

  <!-- NAV -->
  <div class="nav">
    <div onclick="go('feed')">🏠 Home</div>
    <div onclick="go('explore')">🔍 Explore</div>
    <div onclick="go('analytics')">📊 Analytics</div>
  </div>

</div>

<script>

function go(page){

  document.querySelectorAll(".page")
  .forEach(p=>p.classList.remove("active"));

  document.getElementById(page)
  .classList.add("active");

}

/* SIMPLE SWIPE */
let startY = 0;

document.addEventListener("touchstart",e=>{
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{

  let endY = e.changedTouches[0].clientY;

  let feed = document.getElementById("feed");

  if(startY - endY > 50){
    feed.scrollTop += window.innerHeight;
  }

  if(endY - startY > 50){
    feed.scrollTop -= window.innerHeight;
  }

});

</script>

</body>
</html>
