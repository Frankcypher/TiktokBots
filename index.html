<!DOCTYPE html>
<html>
<head>
  <title>TikTok Enterprise Demo</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
      overflow: hidden;
      color: white;
    }

    .phone {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .topbar {
      position: absolute;
      top: 0;
      width: 100%;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.3);
    }

    .page {
      display: none;
      height: 100vh;
      width: 100vw;
      position: absolute;
      top: 0;
      left: 0;
    }

    .active {
      display: block;
    }

    #feed {
      transition: transform 0.4s ease;
    }

    .video {
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 120px;
      left: 20px;
    }

    .tag {
      background: #00c2ff;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 5px;
      display: inline-block;
    }

    .nav {
      position: absolute;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      font-size: 12px;
    }

    .nav div {
      cursor: pointer;
    }

    /* LIKE ANIMATION */
    .heart {
      position: absolute;
      right: 20px;
      bottom: 160px;
      font-size: 30px;
      cursor: pointer;
      transition: 0.2s;
    }

    .heart:active {
      transform: scale(1.4);
    }

  </style>
</head>

<body>

<!-- 🎵 BACKGROUND SOUNDTRACK -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_c8c8a8b6b6.mp3?filename=lofi-study-112191.mp3">
</audio>

<div class="phone">

  <div class="topbar">
    <div>📶 5G</div>
    <div>🔋 88%</div>
  </div>

  <!-- FEED -->
  <div id="feed" class="page active">

    <div class="video">
      <video autoplay muted loop>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4">
      </video>

      <div class="overlay">
        <h3>@creator1</h3>
        <div class="tag">🔐 OAuth: TikTok Login Simulation</div>
      </div>

      <div class="heart" onclick="like()">❤️</div>
    </div>

    <div class="video">
      <video muted loop>
        <source src="https://www.w3schools.com/html/movie.mp4">
      </video>

      <div class="overlay">
        <h3>@creator2</h3>
        <div class="tag">📡 Feed: Demo Content Source</div>
      </div>

      <div class="heart" onclick="like()">❤️</div>
    </div>

  </div>

  <!-- NAV -->
  <div class="nav">
    <div onclick="switchFeed()">🏠 Feed</div>
    <div onclick="toggleSound()">🔊 Sound</div>
    <div onclick="startMusic()">🎵 Music</div>
  </div>

</div>

<script>

let startY = 0;
let soundOn = false;

/* 🎵 BACKGROUND MUSIC */
function startMusic(){
  let music = document.getElementById("bgMusic");
  music.play();
  soundOn = true;
}

/* 🔊 TOGGLE SOUND */
function toggleSound(){
  let videos = document.querySelectorAll("video");

  videos.forEach(v=>{
    v.muted = !v.muted;
  });

  navigator.vibrate?.(50);
}

/* ❤️ LIKE SOUND EFFECT */
function like(){
  let audio = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_7fb7c5a8d2.mp3?filename=click-124467.mp3");
  audio.play();
}

/* SWIPE ENGINE */
document.addEventListener("touchstart",e=>{
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{

  let endY = e.changedTouches[0].clientY;
  let feed = document.getElementById("feed");

  if(startY - endY > 50){
    feed.scrollTop += window.innerHeight;
  }

  if(endY - startY > 50){
    feed.scrollTop -= window.innerHeight;
  }

  navigator.vibrate?.(30);

});

/* OPTIONAL NAV RESET */
function switchFeed(){
  document.getElementById("feed").scrollTop = 0;
}

</script>

</body>
</html>
