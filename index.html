<!DOCTYPE html>
<html>
<head>
  <title>TikTok Final Safe Demo</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: black;
      color: white;
      height: 100%;
      overflow: hidden;
    }

    /* PAGE FADE */
    .page {
      height: 100vh;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.5s ease;
    }

    .active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    input {
      padding: 12px;
      width: 220px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #ff2d55;
      color: white;
      cursor: pointer;
    }

    /* SPINNER */
    .spinner {
      margin-top: 20px;
      width: 45px;
      height: 45px;
      border: 4px solid #333;
      border-top: 4px solid #ff2d55;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* FEED */
    #feed {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .video {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 80px;
      left: 20px;
    }

    .username {
      opacity: 0.8;
      margin-bottom: 5px;
    }

    .actions {
      position: absolute;
      right: 15px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: center;
    }

    .btn {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 50%;
    }

    .like {
      color: #ff2d55;
    }

    .muteBtn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <h1>🎵 TikTok Login</h1>
  <input id="username" placeholder="Enter username">
  <button onclick="login()">Login with TikTok</button>
</div>

<!-- LOADING -->
<div id="loadingScreen" class="page">
  <h2 id="loadingText">Logging in...</h2>
  <div class="spinner"></div>
</div>

<!-- FEED -->
<div id="dashboardPage" class="page">
  <div id="feed">

    <!-- VIDEO 1 -->
    <div class="video">
      <video autoplay muted loop playsinline>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4">
      </video>

      <div class="muteBtn" onclick="toggleMute(this)">🔇</div>

      <div class="overlay">
        <div class="username" id="userDisplay"></div>
        <div>🔥 Trending Dance Video</div>
      </div>

      <div class="actions">
        <div class="btn like">❤️<br>120K</div>
        <div class="btn">💬<br>5K</div>
        <div class="btn">↗</div>
      </div>
    </div>

    <!-- VIDEO 2 -->
    <div class="video">
      <video autoplay muted loop playsinline>
        <source src="https://www.w3schools.com/html/movie.mp4">
      </video>

      <div class="overlay">
        <div>🎬 AI Generated Content</div>
      </div>

      <div class="actions">
        <div class="btn like">❤️<br>89K</div>
        <div class="btn">💬<br>3K</div>
        <div class="btn">↗</div>
      </div>
    </div>

  </div>
</div>

<script>
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function login() {
  let name = document.getElementById("username").value;
  if (!name) return;

  showPage("loadingScreen");

  setTimeout(() => {
    document.getElementById("loadingText").innerText = "Authenticating...";

    setTimeout(() => {
      showPage("dashboardPage");
      document.getElementById("userDisplay").innerText = "@" + name;

    }, 1500);

  }, 1500);
}

function toggleMute(btn) {
  let video = btn.parentElement.querySelector("video");
  video.muted = !video.muted;
  btn.innerText = video.muted ? "🔇" : "🔊";
}
</script>

</body>
</html>
