<!DOCTYPE html>
<html>
<head>
  <title>TikTok Integration Demo</title>
</head>

<body style="font-family:Arial; background:#111; color:white; text-align:center; padding:30px;">

  <h1>🎵 TikTok Integration Demo App</h1>

  <!-- LOGIN SECTION -->
  <div style="margin-top:30px;">
    <h2>Login</h2>

    <input id="username" placeholder="Enter username"
      style="padding:10px; width:200px;">

    <br><br>

    <button onclick="loginTikTok()" style="padding:12px 20px;">
      Login with TikTok
    </button>

    <p id="loginStatus" style="margin-top:10px;"></p>
  </div>

  <hr style="margin:30px;">

  <!-- PROFILE SECTION -->
  <div id="profile" style="display:none;">
    <h2>👤 User Profile</h2>

    <p>Name: <span id="nameDisplay">Demo User</span></p>
    <p>Username: <span id="userDisplay">@demo_user</span></p>
  </div>

  <hr style="margin:30px;">

  <!-- VIDEO SECTION -->
  <div id="videos" style="display:none;">
    <h2>🎬 TikTok Videos</h2>

    <ul style="list-style:none;">
      <li>Video 1 - Trending content</li>
      <li>Video 2 - Viral idea</li>
      <li>Video 3 - AI generated script</li>
    </ul>
  </div>

  <script>
    function loginTikTok() {
      let name = document.getElementById("username").value;

      if (name === "") {
        document.getElementById("loginStatus").innerText =
          "Please enter username first ❌";
        return;
      }

      document.getElementById("loginStatus").innerText =
        "Logging in...";

      setTimeout(() => {
        document.getElementById("loginStatus").innerText =
          "Login successful ✔ Welcome " + name;

        document.getElementById("profile").style.display = "block";
        document.getElementById("videos").style.display = "block";

        document.getElementById("nameDisplay").innerText = name;
        document.getElementById("userDisplay").innerText = "@" + name;
      }, 1500);
    }
  </script>

</body>
</html>
