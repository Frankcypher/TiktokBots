<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TikTok Demo</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:black;
      color:white;
    }

    /* PAGES */
    .page{
      width:100%;
      height:100vh;
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .active{
      display:flex;
    }

    /* LOGIN */
    input{
      width:260px;
      padding:14px;
      margin-top:12px;
      border:none;
      border-radius:10px;
      outline:none;
      font-size:16px;
    }

    button{
      margin-top:15px;
      padding:14px 20px;
      border:none;
      border-radius:10px;
      background:#ff0050;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    #loadingText{
      font-size:22px;
      text-align:center;
    }

    /* FEED */
    #feed{
      width:100%;
      height:100vh;
      transition:0.4s;
    }

    .video{
      width:100%;
      height:100vh;
      position:relative;
      overflow:hidden;
      background:black;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      background:black;
    }

    /* OVERLAY */
    .overlay{
      position:absolute;
      bottom:90px;
      left:15px;
      z-index:2;
    }

    .username{
      font-weight:bold;
      margin-bottom:8px;
    }

    /* ACTIONS */
    .actions{
      position:absolute;
      right:10px;
      bottom:120px;
      display:flex;
      flex-direction:column;
      gap:18px;
      z-index:2;
    }

    .btn{
      width:55px;
      height:55px;
      border-radius:50%;
      background:rgba(255,255,255,0.15);
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-size:14px;
    }

    .muteBtn{
      position:absolute;
      top:20px;
      right:20px;
      background:rgba(0,0,0,0.5);
      padding:10px;
      border-radius:10px;
      z-index:2;
    }

    /* COMMENTS */
    .comments{
      position:absolute;
      bottom:-100%;
      left:0;
      width:100%;
      height:40%;
      background:#111;
      z-index:3;
      transition:0.3s;
      padding:20px;
    }

    .comments.active{
      bottom:0;
    }

    .comment{
      margin-bottom:15px;
    }

    /* SHARE */
    .share{
      position:absolute;
      bottom:-100%;
      left:0;
      width:100%;
      height:25%;
      background:#111;
      z-index:3;
      transition:0.3s;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
    }

    .share.active{
      bottom:0;
    }

  </style>
</head>

<body>

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="page active">

    <h1>🎵 TikTok Login</h1>

    <input
      id="username"
      placeholder="Username"
    >

    <input
      id="password"
      type="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Login with TikTok
    </button>

  </div>

  <!-- LOADING PAGE -->
  <div id="loadingPage" class="page">

    <h2 id="loadingText">
      Redirecting to TikTok...
    </h2>

  </div>

  <!-- DASHBOARD -->
  <div id="dashboardPage" class="page">

    <div id="feed">

      <!-- VIDEO 1 -->
      <div class="video">

        <video muted loop playsinline>
          <source src="https://www.w3schools.com/html/mov_bbb.mp4">
        </video>

        <div class="muteBtn"
          onclick="toggleMute(this)">
          🔇
        </div>

        <div class="overlay">
          <div class="username" id="userDisplay">
            @user
          </div>

          <div>
            🔥 Trending Dance Video
          </div>
        </div>

        <div class="actions">

          <div class="btn">
            ❤️
            <small>120K</small>
          </div>

          <div class="btn"
            onclick="toggleComments(0)">
            💬
            <small>5K</small>
          </div>

          <div class="btn"
            onclick="toggleShare(0)">
            ↗
          </div>

        </div>

        <!-- COMMENTS -->
        <div class="comments" id="comments0">

          <div class="comment">
            🔥 Amazing video
          </div>

          <div class="comment">
            😍 So cool
          </div>

          <div class="comment">
            🚀 Viral content
          </div>

        </div>

        <!-- SHARE -->
        <div class="share" id="share0">

          <button>Copy</button>
          <button>WhatsApp</button>

        </div>

      </div>

      <!-- VIDEO 2 -->
      <div class="video">

        <video muted loop playsinline>
          <source src="https://www.w3schools.com/html/movie.mp4">
        </video>

        <div class="overlay">
          <div>
            🎬 AI Generated Content
          </div>
        </div>

      </div>

      <!-- VIDEO 3 -->
      <div class="video">

        <video muted loop playsinline>
          <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4">
        </video>

        <div class="overlay">
          <div>
            🚀 Trending For You
          </div>
        </div>

      </div>

    </div>

  </div>

<script>

let currentIndex = 0;
let startY = 0;

/* PAGE SWITCH */
function showPage(id){

  document.querySelectorAll(".page")
  .forEach(page=>{
    page.classList.remove("active");
  });

  document
  .getElementById(id)
  .classList.add("active");
}

/* LOGIN */
function login(){

  let username =
  document.getElementById("username").value;

  let password =
  document.getElementById("password").value;

  if(username === "" || password === ""){
    alert("Enter username and password");
    return;
  }

  showPage("loadingPage");

  document.getElementById("loadingText")
  .innerText =
  "Redirecting to TikTok...";

  setTimeout(()=>{

    document.getElementById("loadingText")
    .innerText =
    "Authorizing with TikTok...";

    setTimeout(()=>{

      document.getElementById("loadingText")
      .innerText =
      "Returning to app...";

      setTimeout(()=>{

        showPage("dashboardPage");

        document.getElementById("userDisplay")
        .innerText =
        "@" + username;

        playCurrentVideo();

      },1500);

    },1500);

  },1500);
}

/* PLAY VIDEO */
function playCurrentVideo(){

  let videos =
  document.querySelectorAll("video");

  videos.forEach((video,index)=>{

    if(index === currentIndex){

      video.play();

    }else{

      video.pause();

    }

  });
}

/* SWIPE */
document.addEventListener(
"touchstart",
e=>{
  startY = e.touches[0].clientY;
}
);

document.addEventListener(
"touchend",
e=>{

  let endY =
  e.changedTouches[0].clientY;

  if(startY - endY > 50){
    currentIndex++;
  }

  else if(endY - startY > 50){
    currentIndex--;
  }

  let total =
  document.querySelectorAll(".video").length;

  if(currentIndex < 0)
    currentIndex = 0;

  if(currentIndex >= total)
    currentIndex = total - 1;

  document.getElementById("feed")
  .style.transform =
  `translateY(-${currentIndex * 100}vh)`;

  playCurrentVideo();

}
);

/* AUTOPLAY */
window.addEventListener(
"load",
()=>{

  document
  .querySelectorAll("video")
  .forEach(video=>{

    video.muted = true;

    video.play()
    .catch(()=>{});

  });

}
);

/* MUTE */
function toggleMute(btn){

  let video =
  btn.parentElement
  .querySelector("video");

  video.muted =
  !video.muted;

  btn.innerText =
  video.muted ? "🔇" : "🔊";
}

/* COMMENTS */
function toggleComments(id){

  document
  .getElementById("comments"+id)
  .classList.toggle("active");
}

/* SHARE */
function toggleShare(id){

  document
  .getElementById("share"+id)
  .classList.toggle("active");
}

</script>

</body>
</html>
