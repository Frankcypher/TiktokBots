<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OAuth Callback</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.card {
  background: #111;
  padding: 25px;
  border-radius: 16px;
  width: 90%;
  max-width: 420px;
}

.loader {
  width: 45px;
  height: 45px;
  border: 4px solid #333;
  border-top: 4px solid #ff0050;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card" id="status">
  <h2>🔐 Processing TikTok Login</h2>
  <div class="loader"></div>
  <p>Please wait...</p>
</div>

<script>

/*
  STEP 1: Read TikTok response
*/
const params = new URLSearchParams(window.location.search);

const code = params.get("code");
const state = params.get("state");

/*
  STEP 2: Validate
*/
const savedState = localStorage.getItem("oauth_state");

if (!code) {
  document.getElementById("status").innerHTML =
    "<h2>❌ No authorization code received</h2>";
} 
else if (state !== savedState) {
  document.getElementById("status").innerHTML =
    "<h2>❌ Invalid OAuth state</h2>";
} 
else {

  // STEP 3: Save auth code
  localStorage.setItem("tiktok_code", code);

  /*
    STEP 4: Simulate success flow
    (In real app: send code to backend to exchange token)
  */
  setTimeout(() => {

    document.getElementById("status").innerHTML =
      "<h2>✅ Login Successful</h2><p>Redirecting...</p>";

    setTimeout(() => {

      window.location.href =
        "https://tiktok-bots.vercel.app/dashboard.html";

    }, 1500);

  }, 1200);

}

</script>

</body>
  </html>
